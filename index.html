<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Barcode Scanner</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0; display: flex; flex-direction: column;
    max-width: 600px; margin: 0 auto; height: 100vh; overflow: hidden; padding: 8px;
  }
  .topbar { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .topbar h1 { font-size: 15px; color: #38bdf8; flex: 1; }
  .stat { font-size: 12px; color: #94a3b8; white-space: nowrap; }
  /* khu camera: chiều cao cố định, gọn */
  #reader {
    width: 100%; max-height: 50vh; border-radius: 10px; overflow: hidden;
    display: none; background:#000;
  }
  #reader video { border-radius: 10px; max-height: 50vh; object-fit: cover; }
  .controls { display: flex; gap: 6px; margin: 6px 0; }
  .controls .btn { margin: 0; padding: 10px; font-size: 14px; }
  .btn {
    flex: 1; padding: 10px; font-size: 14px; font-weight: 600;
    border: none; border-radius: 9px; cursor: pointer; color: #fff;
  }
  .btn-primary { background: #0ea5e9; }
  .btn-stop { background: #f43f5e; }
  .btn-export { background: #22c55e; }
  .btn-clear { background: #475569; }
  .btn-mini { flex: 0 0 auto; padding: 10px 12px; background: #334155; }
  .btn:active { opacity: .8; }
  .zoomWrap { display: none; align-items: center; gap: 8px; margin: 4px 0; font-size: 12px; }
  .zoomWrap input { flex: 1; }
  .manual { display: flex; gap: 6px; margin: 6px 0; }
  .manual input[type=text] {
    flex: 1; padding: 9px; border-radius: 8px; border: 1px solid #334155;
    background: #1e293b; color: #e2e8f0; font-size: 14px;
  }
  .manual button { flex: 0 0 60px; }
  /* danh sách chiếm phần còn lại, tự cuộn bên trong */
  .listWrap { flex: 1; overflow-y: auto; border-top: 1px solid #1e293b; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    position: sticky; top: 0; background: #0f172a; color: #38bdf8;
    padding: 8px 6px; text-align: left; z-index: 1; font-size: 12px;
  }
  td { padding: 8px 6px; border-bottom: 1px solid #1e293b; text-align: left; vertical-align: top; }
  td.code { font-family: monospace; word-break: break-all; }
  tr.newrow td { animation: flash 1s ease; }
  @keyframes flash { 0% { background: #155e75; } 100% { background: transparent; } }
  .del { color: #f43f5e; cursor: pointer; font-weight: 700; }
  .empty { text-align: center; color: #475569; padding: 20px; }
  .opts { display: flex; gap: 12px; font-size: 12px; color: #94a3b8; margin: 2px 0 4px; flex-wrap: wrap; }
</style>
</head>
<body>
  <div class="topbar">
    <h1>&#128247; Qu&#233;t Barcode</h1>
    <span class="stat" id="stat">0 m&#227;</span>
  </div>

  <div id="reader"></div>

  <div class="zoomWrap" id="zoomWrap">
    <span>&#128269;</span>
    <input type="range" id="zoomRange" min="1" max="5" step="0.1" value="2">
    <span id="zoomVal">2.0x</span>
    <button class="btn btn-mini" id="torchBtn" style="display:none">&#128294;</button>
  </div>

  <div class="controls">
    <button id="startBtn" class="btn btn-primary">B&#7855;t &#273;&#7847;u qu&#233;t</button>
    <button id="stopBtn" class="btn btn-stop" style="display:none">D&#7915;ng</button>
    <button id="exportBtn" class="btn btn-export">CSV</button>
    <button id="clearBtn" class="btn btn-clear">X&#243;a</button>
  </div>

  <div class="opts">
    <label><input type="checkbox" id="dedupe" checked> B&#7887; tr&#249;ng</label>
    <label><input type="checkbox" id="beep" checked> B&#237;p</label>
    <label><input type="checkbox" id="vibrate" checked> Rung</label>
  </div>

  <div class="manual">
    <input type="text" id="manualInput" placeholder="Nh&#7853;p m&#227; th&#7911; c&#244;ng...">
    <button id="addBtn" class="btn btn-primary">Th&#234;m</button>
  </div>

  <div class="listWrap">
    <table>
      <thead><tr><th>#</th><th>M&#227;</th><th>Lo&#7841;i</th><th>Gi&#7901;</th><th></th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

<script>
(function () {
  var records = [];
  var lastCode = "", lastTime = 0;
  var html5Qr = null;
  var running = false;
  var justAdded = -1;

  var startBtn = document.getElementById("startBtn");
  var stopBtn = document.getElementById("stopBtn");
  var readerEl = document.getElementById("reader");
  var tbody = document.getElementById("tbody");
  var stat = document.getElementById("stat");
  var zoomWrap = document.getElementById("zoomWrap");
  var zoomRange = document.getElementById("zoomRange");
  var zoomVal = document.getElementById("zoomVal");
  var torchBtn = document.getElementById("torchBtn");
  var torchOn = false;

  function pad(n){ return n<10?"0"+n:""+n; }
  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function feedback() {
    if (document.getElementById("beep").checked) {
      try {
        var ctx = new (window.AudioContext||window.webkitAudioContext)();
        var osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = 880; osc.type = "square";
        g.gain.setValueAtTime(.2, ctx.currentTime); osc.start();
        g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+.15);
        osc.stop(ctx.currentTime+.15);
      } catch(e){}
    }
    if (document.getElementById("vibrate").checked && navigator.vibrate) navigator.vibrate(80);
  }

  function addRecord(code, type) {
    var now = Date.now();
    if (document.getElementById("dedupe").checked) {
      for (var i=0;i<records.length;i++) if (records[i].code===code) return;
    }
    if (code===lastCode && (now-lastTime)<1500) return;
    lastCode = code; lastTime = now;
    var d = new Date();
    var ts = pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
    // mã mới đẩy lên ĐẦU mảng
    records.unshift({ code: code, type: type||"MANUAL", time: ts });
    justAdded = 0;
    feedback(); render();
  }

  function render() {
    if (records.length===0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">Ch&#432;a c&#243; m&#227; n&#224;o</td></tr>';
    } else {
      var h="";
      for (var i=0;i<records.length;i++){
        var r=records[i];
        var stt = records.length - i; // số thứ tự theo thứ tự quét thực tế
        var cls = (i===justAdded) ? " class='newrow'" : "";
        h+="<tr"+cls+"><td>"+stt+"</td><td class='code'>"+esc(r.code)+
           "</td><td>"+esc(r.type)+"</td><td>"+r.time+
           "</td><td><span class='del' data-i='"+i+"'>&#10005;</span></td></tr>";
      }
      tbody.innerHTML = h;
    }
    stat.textContent = records.length+" m\u00e3";
    justAdded = -1;
  }

  tbody.addEventListener("click", function(e){
    if (e.target.classList.contains("del")) {
      records.splice(parseInt(e.target.getAttribute("data-i"),10),1); render();
    }
  });

  function onScanSuccess(decodedText, decodedResult) {
    var fmt = "BARCODE";
    try { fmt = decodedResult.result.format.formatName; } catch(e){}
    addRecord(decodedText, fmt);
  }

  function applyCameraExtras() {
    if (!html5Qr) return;
    try {
      var caps = html5Qr.getRunningTrackCapabilities();
      if (caps && caps.zoom) {
        zoomWrap.style.display = "flex";
        zoomRange.min = caps.zoom.min;
        zoomRange.max = caps.zoom.max;
        zoomRange.step = caps.zoom.step || 0.1;
        // đặt zoom mặc định cao (~70% mức tối đa, tối thiểu 4x) để quét nhạy ngay
        var target = Math.max(4, caps.zoom.max * 0.7);
        var initZoom = Math.min(target, caps.zoom.max);
        zoomRange.value = initZoom;
        zoomVal.textContent = parseFloat(initZoom).toFixed(1)+"x";
        html5Qr.applyVideoConstraints({ advanced: [{ zoom: initZoom }] });
        zoomRange.oninput = function(){
          var z = parseFloat(zoomRange.value);
          html5Qr.applyVideoConstraints({ advanced: [{ zoom: z }] });
          zoomVal.textContent = z.toFixed(1)+"x";
        };
      }
      if (caps && caps.torch) {
        torchBtn.style.display = "inline-block";
        torchBtn.onclick = function(){
          torchOn = !torchOn;
          html5Qr.applyVideoConstraints({ advanced: [{ torch: torchOn }] });
          torchBtn.style.background = torchOn ? "#facc15" : "#334155";
        };
      }
    } catch(e){}
  }

  startBtn.addEventListener("click", function(){
    readerEl.style.display = "block";
    startBtn.style.display = "none";
    stopBtn.style.display = "block";

    html5Qr = new Html5Qrcode("reader", {
      formatsToSupport: [
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.CODE_93,
        Html5QrcodeSupportedFormats.ITF,
        Html5QrcodeSupportedFormats.CODABAR,
        Html5QrcodeSupportedFormats.QR_CODE
      ],
      verbose: false
    });

    var config = {
      fps: 15,
      qrbox: function(w, h){
        var bw = Math.floor(w * 0.85);
        var bh = Math.floor(Math.min(h * 0.6, bw * 0.4));
        return { width: bw, height: bh };
      },
      aspectRatio: 1.6,
      experimentalFeatures: { useBarCodeDetectorIfSupported: true },
      videoConstraints: {
        facingMode: "environment",
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    };

    html5Qr.start({ facingMode: "environment" }, config, onScanSuccess, function(){})
      .then(function(){
        running = true;
        setTimeout(applyCameraExtras, 800);
      })
      .catch(function(err){
        alert("Kh\u00f4ng m\u1edf \u0111\u01b0\u1ee3c camera: "+err);
        stopScan();
      });
  });

  function stopScan(){
    if (html5Qr && running) {
      html5Qr.stop().then(function(){ html5Qr.clear(); }).catch(function(){});
    }
    running = false; torchOn = false;
    readerEl.style.display = "none";
    startBtn.style.display = "block";
    stopBtn.style.display = "none";
    zoomWrap.style.display = "none";
    torchBtn.style.display = "none";
  }
  stopBtn.addEventListener("click", stopScan);

  document.getElementById("addBtn").addEventListener("click", function(){
    var inp = document.getElementById("manualInput");
    var v = inp.value.trim();
    if (v){ addRecord(v,"MANUAL"); inp.value=""; }
  });
  document.getElementById("manualInput").addEventListener("keydown", function(e){
    if (e.key==="Enter") document.getElementById("addBtn").click();
  });

  document.getElementById("clearBtn").addEventListener("click", function(){
    if (records.length && confirm("X\u00f3a to\u00e0n b\u1ed9 "+records.length+" m\u00e3?")){ records=[]; render(); }
  });

  document.getElementById("exportBtn").addEventListener("click", function(){
    if (records.length===0){ alert("Ch\u01b0a c\u00f3 d\u1eef li\u1ec7u \u0111\u1ec3 xu\u1ea5t."); return; }
    // xuất theo thứ tự quét (cũ -> mới) cho dễ đọc
    var rows = records.slice().reverse();
    var csv = "STT,Ma,Loai,Gio\n";
    for (var i=0;i<rows.length;i++){
      var r=rows[i];
      csv += (i+1)+",\""+r.code.replace(/"/g,'""')+"\","+r.type+",\""+r.time+"\"\n";
    }
    var blob = new Blob(["\uFEFF"+csv], { type:"text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "barcode_"+new Date().toISOString().slice(0,10)+".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  render();
})();
</script>
</body>
</html>
