<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Barcode Scanner</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0; display: flex; flex-direction: column;
    max-width: 600px; margin: 0 auto; height: 100vh; overflow: hidden; padding: 8px;
  }
  .topbar { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .topbar h1 { font-size: 15px; color: #38bdf8; flex: 1; }
  .stat { font-size: 12px; color: #94a3b8; white-space: nowrap; }
  .engine { font-size: 10px; color: #475569; }
  /* khu camera */
  #camWrap {
    position: relative; width: 100%; max-height: 50vh; border-radius: 10px;
    overflow: hidden; display: none; background:#000;
  }
  #reader { width: 100%; }
  #reader video, #nativeVideo {
    width: 100%; max-height: 50vh; object-fit: cover; border-radius: 10px; display: block;
  }
  #nativeVideo { display: none; }
  /* khung ngắm cho chế độ native */
  .reticle {
    position: absolute; left: 7%; right: 7%; top: 50%; transform: translateY(-50%);
    height: 28%; border: 2px solid rgba(56,189,248,.9); border-radius: 8px;
    pointer-events: none; display: none;
  }
  .controls { display: flex; gap: 6px; margin: 6px 0; }
  .controls .btn { margin: 0; padding: 10px; font-size: 14px; }
  .btn {
    flex: 1; padding: 10px; font-size: 14px; font-weight: 600;
    border: none; border-radius: 9px; cursor: pointer; color: #fff;
  }
  .btn-primary { background: #0ea5e9; }
  .btn-stop { background: #f43f5e; }
  .btn-export { background: #22c55e; }
  .btn-clear { background: #475569; }
  .btn-mini { flex: 0 0 auto; padding: 10px 12px; background: #334155; }
  .btn:active { opacity: .8; }
  .zoomWrap { display: none; align-items: center; gap: 8px; margin: 4px 0; font-size: 12px; }
  .zoomWrap input { flex: 1; }
  .manual { display: flex; gap: 6px; margin: 6px 0; }
  .manual input[type=text] {
    flex: 1; padding: 9px; border-radius: 8px; border: 1px solid #334155;
    background: #1e293b; color: #e2e8f0; font-size: 14px;
  }
  .manual button { flex: 0 0 60px; }
  .listHead {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px;
    color: #38bdf8; font-size: 12px; border-bottom: 1px solid #1e293b;
  }
  .listHead .h-stt { flex: 0 0 28px; }
  .listHead .h-code { flex: 1; }
  .listHead .h-time { flex: 0 0 60px; text-align: right; }
  .listWrap { flex: 1; overflow-y: auto; margin-top: 0; }
  .empty { text-align: center; color: #475569; padding: 20px; }
  .item {
    position: relative; overflow: hidden; border-bottom: 1px solid #1e293b;
    background: #0f172a;
  }
  .item .delBg {
    position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
    background: #f43f5e; color: #fff; display: flex; align-items: center;
    justify-content: center; font-weight: 700; font-size: 14px;
  }
  .item .content {
    position: relative; display: flex; align-items: center; gap: 8px;
    padding: 10px 8px; background: #0f172a; transition: transform .2s ease;
    will-change: transform; touch-action: pan-y;
  }
  .item .c-stt { flex: 0 0 28px; color: #94a3b8; font-size: 13px; }
  .item .c-code { flex: 1; font-family: monospace; word-break: break-all; font-size: 14px; }
  .item .c-type { font-size: 10px; color: #64748b; }
  .item .c-time { flex: 0 0 60px; text-align: right; color: #94a3b8; font-size: 12px; }
  .item.newrow .content { animation: flash 1s ease; }
  @keyframes flash { 0% { background: #155e75; } 100% { background: #0f172a; } }
  .opts { display: flex; gap: 12px; font-size: 12px; color: #94a3b8; margin: 2px 0 4px; flex-wrap: wrap; }
  .toast {
    position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%) translateY(20px);
    background: #1e293b; color: #fff; padding: 10px 18px; border-radius: 24px;
    font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none;
    transition: opacity .2s ease, transform .2s ease; z-index: 999; max-width: 90%;
    text-align: center; box-shadow: 0 4px 12px rgba(0,0,0,.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok { background: #15803d; }
  .toast.dup { background: #b45309; }
</style>
</head>
<body>
  <div class="topbar">
    <h1>&#128247; Qu&#233;t Barcode</h1>
    <span class="engine" id="engine"></span>
    <span class="stat" id="stat">0 m&#227;</span>
  </div>

  <div id="camWrap">
    <div id="reader"></div>
    <video id="nativeVideo" playsinline muted></video>
    <div class="reticle" id="reticle"></div>
  </div>

  <div class="zoomWrap" id="zoomWrap">
    <span>&#128269;</span>
    <input type="range" id="zoomRange" min="1" max="5" step="0.1" value="3.6">
    <span id="zoomVal">3.6x</span>
    <button class="btn btn-mini" id="torchBtn" style="display:none">&#128294;</button>
  </div>

  <div class="controls">
    <button id="startBtn" class="btn btn-primary">B&#7855;t &#273;&#7847;u qu&#233;t</button>
    <button id="stopBtn" class="btn btn-stop" style="display:none">D&#7915;ng</button>
    <button id="exportBtn" class="btn btn-export">CSV</button>
    <button id="clearBtn" class="btn btn-clear">X&#243;a</button>
  </div>

  <div class="opts">
    <label><input type="checkbox" id="dedupe" checked> B&#7887; tr&#249;ng</label>
    <label><input type="checkbox" id="beep" checked> B&#237;p</label>
    <label><input type="checkbox" id="vibrate" checked> Rung</label>
  </div>

  <div class="manual">
    <input type="text" id="manualInput" placeholder="Nh&#7853;p m&#227; th&#7911; c&#244;ng...">
    <button id="addBtn" class="btn btn-primary">Th&#234;m</button>
  </div>

  <div class="listHead">
    <span class="h-stt">#</span>
    <span class="h-code">M&#227;</span>
    <span class="h-time">Gi&#7901;</span>
  </div>
  <div class="listWrap" id="listWrap"></div>

  <div class="toast" id="toast"></div>

<script>
(function () {
  var records = [];
  var lastCode = "", lastTime = 0;
  var justAdded = -1;

  // engine state
  var mode = null;            // "native" hoặc "html5"
  var running = false;
  var html5Qr = null;
  var nativeStream = null;
  var nativeTrack = null;
  var nativeDetector = null;
  var nativeRAF = null;
  var torchOn = false;

  var startBtn = document.getElementById("startBtn");
  var stopBtn = document.getElementById("stopBtn");
  var camWrap = document.getElementById("camWrap");
  var nativeVideo = document.getElementById("nativeVideo");
  var reticle = document.getElementById("reticle");
  var listWrap = document.getElementById("listWrap");
  var stat = document.getElementById("stat");
  var engineLbl = document.getElementById("engine");
  var zoomWrap = document.getElementById("zoomWrap");
  var zoomRange = document.getElementById("zoomRange");
  var zoomVal = document.getElementById("zoomVal");
  var torchBtn = document.getElementById("torchBtn");

  function pad(n){ return n<10?"0"+n:""+n; }
  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function feedback() {
    if (document.getElementById("beep").checked) {
      try {
        var ctx = new (window.AudioContext||window.webkitAudioContext)();
        var osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = 880; osc.type = "square";
        g.gain.setValueAtTime(.2, ctx.currentTime); osc.start();
        g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+.15);
        osc.stop(ctx.currentTime+.15);
      } catch(e){}
    }
    if (document.getElementById("vibrate").checked && navigator.vibrate) navigator.vibrate(80);
  }

  function dupFeedback() {
    if (document.getElementById("beep").checked) {
      try {
        var ctx = new (window.AudioContext||window.webkitAudioContext)();
        [0, 0.18].forEach(function(t){
          var osc = ctx.createOscillator(), g = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.frequency.value = 300; osc.type = "sine";
          g.gain.setValueAtTime(.25, ctx.currentTime + t); osc.start(ctx.currentTime + t);
          g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + t + 0.12);
          osc.stop(ctx.currentTime + t + 0.12);
        });
      } catch(e){}
    }
    if (document.getElementById("vibrate").checked && navigator.vibrate) navigator.vibrate([60,60,60]);
  }

  var toastTimer = null;
  function showToast(msg, kind) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show " + (kind||"");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.className = "toast"; }, 1500);
  }

  function addRecord(code, type) {
    code = String(code).trim();
    if (!code) return;
    var now = Date.now();
    if (code===lastCode && (now-lastTime)<3000) { lastTime = now; return; }
    lastCode = code; lastTime = now;

    if (document.getElementById("dedupe").checked) {
      for (var i=0;i<records.length;i++) {
        if (records[i].code===code) {
          dupFeedback();
          showToast("\u26a0\ufe0f M\u00e3 \u0111\u00e3 c\u00f3: " + code, "dup");
          flashExisting(i);
          return;
        }
      }
    }
    var d = new Date();
    var ts = pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
    records.unshift({ code: code, type: type||"MANUAL", time: ts });
    justAdded = 0;
    feedback();
    showToast("\u2705 \u0110\u00e3 th\u00eam: " + code, "ok");
    render();
  }

  function flashExisting(idx) {
    var items = listWrap.querySelectorAll(".item");
    if (items[idx]) {
      items[idx].scrollIntoView({ block: "nearest", behavior: "smooth" });
      var c = items[idx].querySelector(".content");
      c.style.transition = "none";
      c.style.background = "#7c2d12";
      setTimeout(function(){
        c.style.transition = "background 1s ease";
        c.style.background = "#0f172a";
      }, 50);
    }
  }

  function render() {
    if (records.length===0) {
      listWrap.innerHTML = '<div class="empty">Ch&#432;a c&#243; m&#227; n&#224;o</div>';
    } else {
      var h="";
      for (var i=0;i<records.length;i++){
        var r=records[i];
        var stt = records.length - i;
        var cls = (i===justAdded) ? " newrow" : "";
        h+="<div class='item"+cls+"' data-i='"+i+"'>"+
             "<div class='delBg'>&#10005; X&#243;a</div>"+
             "<div class='content'>"+
               "<span class='c-stt'>"+stt+"</span>"+
               "<span class='c-code'>"+esc(r.code)+" <span class='c-type'>"+esc(r.type)+"</span></span>"+
               "<span class='c-time'>"+r.time+"</span>"+
             "</div>"+
           "</div>";
      }
      listWrap.innerHTML = h;
      attachSwipe();
    }
    stat.textContent = records.length+" m\u00e3";
    justAdded = -1;
  }

  function attachSwipe() {
    var items = listWrap.querySelectorAll(".item");
    items.forEach(function(item){
      var content = item.querySelector(".content");
      var startX = 0, curX = 0, dragging = false, opened = false;
      var DELW = 80, THRESH = 50;
      function setX(x){ content.style.transform = "translateX("+x+"px)"; }
      content.addEventListener("touchstart", function(e){
        startX = e.touches[0].clientX; dragging = true;
        content.style.transition = "none";
      }, {passive:true});
      content.addEventListener("touchmove", function(e){
        if (!dragging) return;
        curX = e.touches[0].clientX - startX;
        if (opened) curX -= DELW;
        if (curX > 0) curX = 0;
        if (curX < -DELW) curX = -DELW;
        setX(curX);
      }, {passive:true});
      content.addEventListener("touchend", function(){
        dragging = false;
        content.style.transition = "transform .2s ease";
        if (curX < -THRESH) { setX(-DELW); opened = true; }
        else { setX(0); opened = false; }
      });
      item.querySelector(".delBg").addEventListener("click", function(){
        var idx = parseInt(item.getAttribute("data-i"),10);
        records.splice(idx,1); render();
      });
    });
  }

  // ---------- ĐIỀU KHIỂN ZOOM / FLASH (dùng chung cho 1 track) ----------
  function setupTrackControls(track) {
    if (!track) return;
    var caps = track.getCapabilities ? track.getCapabilities() : {};
    if (caps.zoom) {
      zoomWrap.style.display = "flex";
      zoomRange.min = caps.zoom.min;
      zoomRange.max = caps.zoom.max;
      zoomRange.step = caps.zoom.step || 0.1;
      var initZoom = Math.min(3.6, caps.zoom.max);
      if (initZoom < caps.zoom.min) initZoom = caps.zoom.min;
      zoomRange.value = initZoom;
      zoomVal.textContent = parseFloat(initZoom).toFixed(1)+"x";
      try { track.applyConstraints({ advanced: [{ zoom: initZoom }] }); } catch(e){}
      zoomRange.oninput = function(){
        var z = parseFloat(zoomRange.value);
        try { track.applyConstraints({ advanced: [{ zoom: z }] }); } catch(e){}
        zoomVal.textContent = z.toFixed(1)+"x";
      };
    } else {
      zoomWrap.style.display = "none";
    }
    if (caps.torch) {
      torchBtn.style.display = "inline-block";
      torchBtn.onclick = function(){
        torchOn = !torchOn;
        try { track.applyConstraints({ advanced: [{ torch: torchOn }] }); } catch(e){}
        torchBtn.style.background = torchOn ? "#facc15" : "#334155";
      };
    }
  }

  // ---------- CHẾ ĐỘ NATIVE (BarcodeDetector của trình duyệt) ----------
  async function startNative() {
    var formats = ["ean_13","ean_8","upc_a","upc_e","code_128","code_39","code_93","itf","codabar","qr_code"];
    var supported = [];
    try { supported = await window.BarcodeDetector.getSupportedFormats(); } catch(e){ supported = []; }
    var use = formats.filter(function(f){ return supported.indexOf(f) >= 0; });
    if (use.length === 0) use = undefined; // để mặc định nếu không liệt kê được
    nativeDetector = new window.BarcodeDetector(use ? { formats: use } : undefined);

    nativeStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1920 }, height: { ideal: 1080 }
      }, audio: false
    });
    nativeVideo.srcObject = nativeStream;
    await nativeVideo.play();
    nativeTrack = nativeStream.getVideoTracks()[0];

    nativeVideo.style.display = "block";
    reticle.style.display = "block";
    setTimeout(function(){ setupTrackControls(nativeTrack); }, 500);

    var detecting = false;
    function loop() {
      if (!running) return;
      if (!detecting) {
        detecting = true;
        nativeDetector.detect(nativeVideo).then(function(codes){
          detecting = false;
          if (codes && codes.length) {
            // chọn mã to nhất (gần nhất) nếu có nhiều
            var best = codes[0];
            for (var i=1;i<codes.length;i++){
              if (codes[i].boundingBox && best.boundingBox &&
                  codes[i].boundingBox.width > best.boundingBox.width) best = codes[i];
            }
            addRecord(best.rawValue, (best.format||"barcode").toUpperCase());
          }
        }).catch(function(){ detecting = false; });
      }
      nativeRAF = requestAnimationFrame(loop);
    }
    running = true;
    loop();
  }

  function stopNative() {
    if (nativeRAF) cancelAnimationFrame(nativeRAF);
    nativeRAF = null;
    if (nativeStream) { nativeStream.getTracks().forEach(function(t){ t.stop(); }); }
    nativeStream = null; nativeTrack = null; nativeDetector = null;
    nativeVideo.style.display = "none"; nativeVideo.srcObject = null;
    reticle.style.display = "none";
  }

  // ---------- CHẾ ĐỘ HTML5-QRCODE (dự phòng) ----------
  function onScanSuccess(decodedText, decodedResult) {
    var fmt = "BARCODE";
    try { fmt = decodedResult.result.format.formatName; } catch(e){}
    addRecord(decodedText, fmt);
  }

  function startHtml5() {
    html5Qr = new Html5Qrcode("reader", {
      formatsToSupport: [
        Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A, Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.CODE_93, Html5QrcodeSupportedFormats.ITF,
        Html5QrcodeSupportedFormats.CODABAR, Html5QrcodeSupportedFormats.QR_CODE
      ],
      verbose: false
    });
    var config = {
      fps: 15,
      qrbox: function(w, h){
        var bw = Math.floor(w * 0.85);
        var bh = Math.floor(Math.min(h * 0.6, bw * 0.4));
        return { width: bw, height: bh };
      },
      aspectRatio: 1.6,
      experimentalFeatures: { useBarCodeDetectorIfSupported: true },
      videoConstraints: { facingMode: "environment", width:{ideal:1920}, height:{ideal:1080} }
    };
    html5Qr.start({ facingMode: "environment" }, config, onScanSuccess, function(){})
      .then(function(){
        running = true;
        setTimeout(function(){
          try { setupTrackControls(html5Qr.getRunningTrack ? html5Qr.getRunningTrack() : null); } catch(e){}
          // html5-qrcode không expose track trực tiếp ở mọi bản -> dùng caps API riêng
          try {
            var caps = html5Qr.getRunningTrackCapabilities();
            // dựng 1 "track giả" để tái dùng setupTrackControls qua applyVideoConstraints
            if (caps && (caps.zoom || caps.torch)) {
              if (caps.zoom) {
                zoomWrap.style.display = "flex";
                zoomRange.min = caps.zoom.min; zoomRange.max = caps.zoom.max;
                zoomRange.step = caps.zoom.step || 0.1;
                var iz = Math.min(3.6, caps.zoom.max);
                if (iz < caps.zoom.min) iz = caps.zoom.min;
                zoomRange.value = iz; zoomVal.textContent = iz.toFixed(1)+"x";
                html5Qr.applyVideoConstraints({ advanced:[{ zoom: iz }] });
                zoomRange.oninput = function(){
                  var z = parseFloat(zoomRange.value);
                  html5Qr.applyVideoConstraints({ advanced:[{ zoom: z }] });
                  zoomVal.textContent = z.toFixed(1)+"x";
                };
              }
              if (caps.torch) {
                torchBtn.style.display = "inline-block";
                torchBtn.onclick = function(){
                  torchOn = !torchOn;
                  html5Qr.applyVideoConstraints({ advanced:[{ torch: torchOn }] });
                  torchBtn.style.background = torchOn ? "#facc15" : "#334155";
                };
              }
            }
          } catch(e){}
        }, 800);
      })
      .catch(function(err){
        alert("Kh\u00f4ng m\u1edf \u0111\u01b0\u1ee3c camera: "+err);
        stopScan();
      });
  }

  // ---------- BẮT ĐẦU / DỪNG ----------
  startBtn.addEventListener("click", function(){
    camWrap.style.display = "block";
    startBtn.style.display = "none";
    stopBtn.style.display = "block";

    var hasNative = ("BarcodeDetector" in window);
    if (hasNative) {
      mode = "native";
      engineLbl.textContent = "native";
      startNative().catch(function(err){
        // native lỗi -> rơi về html5
        engineLbl.textContent = "html5";
        mode = "html5";
        stopNative();
        startHtml5();
      });
    } else {
      mode = "html5";
      engineLbl.textContent = "html5";
      startHtml5();
    }
  });

  function stopScan(){
    running = false;
    if (mode === "native") {
      stopNative();
    } else if (html5Qr) {
      try { html5Qr.stop().then(function(){ html5Qr.clear(); }).catch(function(){}); } catch(e){}
      html5Qr = null;
    }
    torchOn = false;
    camWrap.style.display = "none";
    startBtn.style.display = "block";
    stopBtn.style.display = "none";
    zoomWrap.style.display = "none";
    torchBtn.style.display = "none";
    torchBtn.style.background = "#334155";
  }
  stopBtn.addEventListener("click", stopScan);

  // ---------- NHẬP TAY / XÓA / XUẤT ----------
  document.getElementById("addBtn").addEventListener("click", function(){
    var inp = document.getElementById("manualInput");
    var v = inp.value.trim();
    if (v){ addRecord(v,"MANUAL"); inp.value=""; }
  });
  document.getElementById("manualInput").addEventListener("keydown", function(e){
    if (e.key==="Enter") document.getElementById("addBtn").click();
  });

  document.getElementById("clearBtn").addEventListener("click", function(){
    if (records.length && confirm("X\u00f3a to\u00e0n b\u1ed9 "+records.length+" m\u00e3?")){ records=[]; render(); }
  });

  document.getElementById("exportBtn").addEventListener("click", function(){
    if (records.length===0){ alert("Ch\u01b0a c\u00f3 d\u1eef li\u1ec7u \u0111\u1ec3 xu\u1ea5t."); return; }
    var lot = prompt("Nh\u1eadp t\u00ean l\u00f4 (\u0111\u1ec3 tr\u1ed1ng n\u1ebfu kh\u00f4ng c\u1ea7n):", "");
    if (lot === null) return;
    lot = lot.trim();
    var rows = records.slice().reverse();
    var csv = "STT,Lo,Ma,Loai,Gio\n";
    var lotCsv = '"' + lot.replace(/"/g,'""') + '"';
    for (var i=0;i<rows.length;i++){
      var r=rows[i];
      csv += (i+1)+","+lotCsv+",\""+r.code.replace(/"/g,'""')+"\","+r.type+",\""+r.time+"\"\n";
    }
    var blob = new Blob(["\uFEFF"+csv], { type:"text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    var safeLot = lot ? lot.replace(/[^\w\u00C0-\u1EF9\- ]/g,"").replace(/\s+/g,"_") : "";
    var datePart = new Date().toISOString().slice(0,10);
    a.download = (safeLot ? safeLot + "_" : "barcode_") + datePart + ".csv";
    a.href = url;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  render();
})();
</script>
</body>
</html>
