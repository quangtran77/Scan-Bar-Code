<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Barcode Scanner</title>
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0; padding: 12px; max-width: 600px; margin: 0 auto;
  }
  h1 { font-size: 18px; margin-bottom: 12px; text-align: center; color: #38bdf8; }
  #videoWrap {
    position: relative; width: 100%; background: #000; border-radius: 12px;
    overflow: hidden; aspect-ratio: 3/4; display: none;
  }
  #video { width: 100%; height: 100%; object-fit: cover; }
  /* khung ngắm: vùng quét ở giữa, dạng chữ nhật ngang cho barcode 1D */
  .reticle {
    position: absolute; left: 6%; right: 6%; top: 38%; bottom: 38%;
    border: 2px solid rgba(56,189,248,.9); border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,.35);
  }
  .scanline {
    position: absolute; left: 8%; right: 8%; top: 50%; height: 2px;
    background: #f43f5e; box-shadow: 0 0 8px #f43f5e; animation: sweep 2s ease-in-out infinite;
  }
  @keyframes sweep { 0%,100%{top:40%} 50%{top:60%} }
  /* thanh điều khiển camera nổi trên video */
  .camCtrl {
    position: absolute; left: 0; right: 0; bottom: 8px; display: flex; gap: 8px;
    justify-content: center; padding: 0 8px; flex-wrap: wrap;
  }
  .camCtrl button, .camCtrl label {
    background: rgba(15,23,42,.8); color: #e2e8f0; border: 1px solid #334155;
    border-radius: 20px; padding: 8px 14px; font-size: 13px; font-weight: 600;
    backdrop-filter: blur(4px);
  }
  .zoomWrap {
    position: absolute; left: 8px; right: 8px; top: 8px; display: none;
    background: rgba(15,23,42,.7); border-radius: 20px; padding: 6px 12px;
    align-items: center; gap: 8px; font-size: 12px; backdrop-filter: blur(4px);
  }
  .zoomWrap input { flex: 1; }
  .btn {
    display: block; width: 100%; padding: 14px; font-size: 16px; font-weight: 600;
    border: none; border-radius: 10px; margin: 8px 0; cursor: pointer; color: #fff;
  }
  .btn-primary { background: #0ea5e9; }
  .btn-stop { background: #f43f5e; }
  .btn-export { background: #22c55e; }
  .btn-clear { background: #475569; }
  .btn:active { opacity: .8; }
  .row { display: flex; gap: 8px; }
  .row .btn { flex: 1; }
  .stat { text-align: center; font-size: 13px; color: #94a3b8; margin: 8px 0; }
  .options { display: flex; align-items: center; gap: 14px; margin: 10px 0; font-size: 14px; flex-wrap: wrap; }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
  th, td { padding: 8px 6px; border-bottom: 1px solid #1e293b; text-align: left; }
  th { color: #38bdf8; }
  td.code { font-family: monospace; word-break: break-all; }
  .del { color: #f43f5e; cursor: pointer; font-weight: 700; }
  .empty { text-align: center; color: #475569; padding: 20px; }
  input[type=text] {
    flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #334155;
    background: #1e293b; color: #e2e8f0; font-size: 14px;
  }
  .hint { font-size: 12px; color: #64748b; text-align: center; margin-top: 4px; }
</style>
</head>
<body>
  <h1>📷 Máy quét Barcode → CSV</h1>

  <div id="videoWrap">
    <video id="video" playsinline></video>
    <div class="reticle"></div>
    <div class="scanline"></div>
    <div class="zoomWrap" id="zoomWrap">
      <span>🔍</span>
      <input type="range" id="zoomRange" min="1" max="5" step="0.1" value="1">
      <span id="zoomVal">1.0x</span>
    </div>
    <div class="camCtrl">
      <button id="torchBtn" style="display:none">🔦 Đèn</button>
    </div>
  </div>

  <button id="startBtn" class="btn btn-primary">Bắt đầu quét</button>
  <button id="stopBtn" class="btn btn-stop" style="display:none">Dừng quét</button>
  <div class="hint" id="hint">Căn mã vạch vào trong khung. Mã nhỏ → kéo thanh zoom phóng to.</div>

  <div class="options">
    <label><input type="checkbox" id="dedupe" checked> Bỏ mã trùng</label>
    <label><input type="checkbox" id="beep" checked> Kêu bíp</label>
    <label><input type="checkbox" id="vibrate" checked> Rung</label>
  </div>

  <div class="row">
    <input type="text" id="manualInput" placeholder="Nhập mã thủ công...">
    <button id="addBtn" class="btn btn-primary" style="flex:0 0 70px;margin:0">Thêm</button>
  </div>

  <div class="stat" id="stat">Đã quét: 0 mã</div>

  <div class="row">
    <button id="exportBtn" class="btn btn-export">Xuất CSV</button>
    <button id="clearBtn" class="btn btn-clear">Xóa hết</button>
  </div>

  <table>
    <thead><tr><th>#</th><th>Mã</th><th>Loại</th><th>Thời gian</th><th></th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>

<script>
(function () {
  // Giới hạn ZXing chỉ tập trung các định dạng 1D phổ biến -> giải mã nhanh & nhạy hơn
  var hints = new Map();
  var formats = [
    ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
    ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.CODE_39,
    ZXing.BarcodeFormat.CODE_93, ZXing.BarcodeFormat.ITF,
    ZXing.BarcodeFormat.CODABAR,
    ZXing.BarcodeFormat.QR_CODE // vẫn quét QR nếu gặp
  ];
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

  var codeReader = new ZXing.BrowserMultiFormatReader(hints, 200); // 200ms ~ 5 lần/giây, mượt
  var records = [];
  var lastCode = "", lastTime = 0;
  var currentTrack = null;
  var torchOn = false;

  var video = document.getElementById("video");
  var videoWrap = document.getElementById("videoWrap");
  var startBtn = document.getElementById("startBtn");
  var stopBtn = document.getElementById("stopBtn");
  var tbody = document.getElementById("tbody");
  var stat = document.getElementById("stat");
  var torchBtn = document.getElementById("torchBtn");
  var zoomWrap = document.getElementById("zoomWrap");
  var zoomRange = document.getElementById("zoomRange");
  var zoomVal = document.getElementById("zoomVal");

  function pad(n){ return n<10?"0"+n:""+n; }
  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function feedback() {
    if (document.getElementById("beep").checked) {
      try {
        var ctx = new (window.AudioContext||window.webkitAudioContext)();
        var osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = 880; osc.type = "square";
        g.gain.setValueAtTime(.2, ctx.currentTime); osc.start();
        g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+.15);
        osc.stop(ctx.currentTime+.15);
      } catch(e){}
    }
    if (document.getElementById("vibrate").checked && navigator.vibrate) navigator.vibrate(80);
  }

  function addRecord(code, type) {
    var now = Date.now();
    if (document.getElementById("dedupe").checked) {
      for (var i=0;i<records.length;i++) if (records[i].code===code) return;
    }
    if (code===lastCode && (now-lastTime)<1500) return;
    lastCode = code; lastTime = now;
    var d = new Date();
    var ts = d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+" "+
             pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
    records.push({ code: code, type: type||"MANUAL", time: ts });
    feedback(); render();
  }

  function render() {
    if (records.length===0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">Chưa có mã nào</td></tr>';
    } else {
      var h="";
      for (var i=0;i<records.length;i++){
        var r=records[i];
        h+="<tr><td>"+(i+1)+"</td><td class='code'>"+esc(r.code)+
           "</td><td>"+esc(r.type)+"</td><td>"+r.time+
           "</td><td><span class='del' data-i='"+i+"'>✕</span></td></tr>";
      }
      tbody.innerHTML = h;
    }
    stat.textContent = "Đã quét: "+records.length+" mã";
  }

  tbody.addEventListener("click", function(e){
    if (e.target.classList.contains("del")) {
      records.splice(parseInt(e.target.getAttribute("data-i"),10),1); render();
    }
  });

  // Cấu hình camera: yêu cầu độ phân giải cao + lấy nét liên tục
  var constraints = {
    video: {
      facingMode: { ideal: "environment" },
      width: { ideal: 1920 },
      height: { ideal: 1080 },
      focusMode: "continuous",
      advanced: [{ focusMode: "continuous" }]
    }
  };

  function setupTrackControls() {
    var stream = video.srcObject;
    if (!stream) return;
    currentTrack = stream.getVideoTracks()[0];
    if (!currentTrack) return;
    var caps = currentTrack.getCapabilities ? currentTrack.getCapabilities() : {};

    // Đèn flash (torch)
    if (caps.torch) {
      torchBtn.style.display = "inline-block";
      torchBtn.onclick = function(){
        torchOn = !torchOn;
        currentTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
        torchBtn.style.background = torchOn ? "rgba(250,204,21,.9)" : "rgba(15,23,42,.8)";
        torchBtn.style.color = torchOn ? "#000" : "#e2e8f0";
      };
    } else {
      torchBtn.style.display = "none";
    }

    // Zoom quang/số (nếu camera hỗ trợ)
    if (caps.zoom) {
      zoomWrap.style.display = "flex";
      zoomRange.min = caps.zoom.min;
      zoomRange.max = caps.zoom.max;
      zoomRange.step = caps.zoom.step || 0.1;
      zoomRange.value = currentTrack.getSettings().zoom || caps.zoom.min;
      zoomVal.textContent = parseFloat(zoomRange.value).toFixed(1)+"x";
      zoomRange.oninput = function(){
        currentTrack.applyConstraints({ advanced: [{ zoom: parseFloat(zoomRange.value) }] });
        zoomVal.textContent = parseFloat(zoomRange.value).toFixed(1)+"x";
      };
    } else {
      zoomWrap.style.display = "none";
    }

    // Cố ép lấy nét liên tục nếu hỗ trợ
    if (caps.focusMode && caps.focusMode.indexOf("continuous")>=0) {
      try { currentTrack.applyConstraints({ advanced: [{ focusMode: "continuous" }] }); } catch(e){}
    }
  }

  startBtn.addEventListener("click", function(){
    videoWrap.style.display = "block";
    startBtn.style.display = "none";
    stopBtn.style.display = "block";
    codeReader.decodeFromConstraints(constraints, video, function(result, err){
      if (result) {
        var fmt = "BARCODE";
        try { fmt = ZXing.BarcodeFormat[result.getBarcodeFormat()]; } catch(e){}
        addRecord(result.getText(), fmt);
      }
    }).then(function(){
      // sau khi stream chạy, lấy track để bật zoom/flash
      setTimeout(setupTrackControls, 600);
    }).catch(function(e){
      alert("Không mở được camera: "+e+"\nHãy dùng HTTPS và cấp quyền camera.");
      stopScan();
    });
  });

  function stopScan(){
    codeReader.reset();
    if (torchOn && currentTrack) { try{ currentTrack.applyConstraints({advanced:[{torch:false}]}); }catch(e){} }
    torchOn = false; currentTrack = null;
    videoWrap.style.display = "none";
    startBtn.style.display = "block";
    stopBtn.style.display = "none";
    torchBtn.style.display = "none";
    zoomWrap.style.display = "none";
  }
  stopBtn.addEventListener("click", stopScan);

  document.getElementById("addBtn").addEventListener("click", function(){
    var inp = document.getElementById("manualInput");
    var v = inp.value.trim();
    if (v){ addRecord(v,"MANUAL"); inp.value=""; }
  });
  document.getElementById("manualInput").addEventListener("keydown", function(e){
    if (e.key==="Enter") document.getElementById("addBtn").click();
  });

  document.getElementById("clearBtn").addEventListener("click", function(){
    if (records.length && confirm("Xóa toàn bộ "+records.length+" mã?")){ records=[]; render(); }
  });

  document.getElementById("exportBtn").addEventListener("click", function(){
    if (records.length===0){ alert("Chưa có dữ liệu để xuất."); return; }
    var csv = "STT,Ma,Loai,ThoiGian\n";
    for (var i=0;i<records.length;i++){
      var r=records[i];
      csv += (i+1)+",\""+r.code.replace(/"/g,'""')+"\","+r.type+",\""+r.time+"\"\n";
    }
    var blob = new Blob(["\uFEFF"+csv], { type:"text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "barcode_"+new Date().toISOString().slice(0,10)+".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  render();
})();
</script>
</body>
</html>
